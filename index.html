<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المسابقات الذكي - نظام الغرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=El+Messiri:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --grid-bg: linear-gradient(135deg, #1a1a1a 0%, #37474f 100%);
            --hex-width: 140px; 
            --hex-height: 160px;
            --hex-gap: 10px;
            --color-1-start: #fbc02d; 
            --color-1-end: #ffa000;
            --color-2-start: #b71c1c; 
            --color-2-end: #880e4f;
            --color-3-start: #ff9800; 
            --color-3-end: #e65100;
            --color-4-start: rgba(255, 255, 255, 0.1); 
            --color-4-end: rgba(255, 255, 255, 0.05);
            --maroon-team: #cf6679;
            --orange-team: #ffb74d;
        }

        body, html { margin: 0; font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        #admin-view, #participant-view, #game-grid-view { display: none; padding: 20px; box-sizing: border-box; width: 100%; }

        /* مؤشر الغرفة */
        #room-tag {
            position: fixed; top: 10px; left: 10px; background: rgba(124, 77, 255, 0.3);
            padding: 5px 15px; border-radius: 20px; border: 1px solid #7c4dff;
            font-size: 14px; z-index: 9999; display: none;
        }

        /* تنسيق الأزرار أسفل الخلية */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }
        .control-group { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .pg2-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 16px;
        }
        .btn-reset-score { background: #444; }
        .btn-rename { background: #0288d1; }
        .btn-win { background: #388e3c; }
        .btn-exit { background: #d32f2f; }

        /* شاشة اللعبة والسكور */
        #game-grid-view { background: var(--grid-bg); flex-direction: column; align-items: center; min-height: 100vh; }
        .scoreboard { 
            display: flex; gap: 40px; margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); 
            padding: 15px 50px; border-radius: 60px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            font-size: 24px; font-weight: bold; justify-content: center; align-items: center;
        }
        .team-score { font-family: 'El Messiri', sans-serif; font-size: 50px; line-height: 1; }

        /* الخلية */
        .honeycomb { display: grid; grid-template-columns: repeat(5, var(--hex-width)); grid-auto-rows: calc(var(--hex-height) * 0.75 + var(--hex-gap)); gap: var(--hex-gap); justify-content: center; margin-bottom: 20px; }
        .hex-container { width: var(--hex-width); height: var(--hex-height); position: relative; cursor: pointer; }
        .hex-container:nth-child(10n+6), .hex-container:nth-child(10n+7), .hex-container:nth-child(10n+8), .hex-container:nth-child(10n+9), .hex-container:nth-child(10n+10) { transform: translateX(calc(var(--hex-width) / 2 + var(--hex-gap) / 2)); }
        .hex { width: 100%; height: 100%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; font-size: 45px; font-weight: bold; transition: all 0.3s ease; }
        .state-0 { background: linear-gradient(135deg, var(--color-4-start), var(--color-4-end)); color: white; }
        .state-1 { background: linear-gradient(135deg, var(--color-1-start), var(--color-1-end)); color: #333; }
        .state-2 { background: linear-gradient(135deg, var(--color-2-start), var(--color-2-end)); color: white; }
        .state-3 { background: linear-gradient(135deg, var(--color-3-start), var(--color-3-end)); color: white; }

        /* شاشة المتسابق والبوزر */
        .login-wrapper { width: 90%; max-width: 400px; background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; }
        .input-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #444; margin-bottom: 15px; background: #2c2c2c; color: white; text-align: center; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 15px; font-weight: bold; border: none; cursor: pointer; margin-bottom: 10px; font-family: 'Cairo'; }
        
        #buzzer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; color: black; z-index: 10000; justify-content: center; 
            align-items: center; font-size: 80px; font-weight: bold; flex-direction: column;
        }
        .flash-red-active { animation: strobe 0.15s infinite; }
        @keyframes strobe { 0% { background-color: red; color: white; } 50% { background-color: white; color: red; } 100% { background-color: red; color: white; } }
    </style>
</head>
<body>

    <div id="room-tag">الغرفة: <span id="room-id-display">#---</span></div>
    <div id="buzzer-overlay">اضغط!</div>
    <audio id="buzzer-sound" src="https://actions.google.com/sounds/v1/alarms/mechanical_clock_ring.ogg" preload="auto"></audio>

    <div id="admin-view">
        <h1>🎮 لوحة التحكم</h1>
        <div id="admin-setup-area" style="max-width:400px; margin: 0 auto 20px;">
            <input type="text" id="admin-room-input" class="input-box" placeholder="أدخل رمز الغرفة">
            <button class="admin-btn" onclick="activateAdminRoom()" style="background:#7c4dff; color:white">تفعيل الغرفة 🔑</button>
        </div>

        <div id="admin-main-controls" style="display:none">
            <button class="admin-btn" onclick="startTheGame()" style="background:#00e676; color:#000">▶️ بدء الجولة (لوحة الحروف)</button>
            <button class="admin-btn" onclick="resetGameServer()" style="background:#ff1744; color:white">🔄 إعادة ضبط النظام</button>
            <div style="display:flex; gap:20px; margin-top:20px">
                <div style="flex:1; border:1px solid #333; padding:10px"><h3>الفريق الخمري</h3><ul id="team-maroon"></ul></div>
                <div style="flex:1; border:1px solid #333; padding:10px"><h3>الفريق البرتقالي</h3><ul id="team-orange"></ul></div>
            </div>
        </div>
    </div>

    <div id="game-grid-view">
        <div class="scoreboard">
            <div onclick="incrementScore(1)" style="color: var(--maroon-team); text-align:center; cursor:pointer">
                <span id="team-name-1">الفريق الخمري</span><br>
                <span id="score-1" class="team-score">0</span>
            </div>
            <div onclick="incrementScore(2)" style="color: var(--orange-team); text-align:center; cursor:pointer">
                <span id="team-name-2">الفريق البرتقالي</span><br>
                <span id="score-2" class="team-score">0</span>
            </div>
        </div>

        <div class="honeycomb" id="grid"></div>

        <div class="controls">
            <div class="control-group">
                <button class="pg2-btn btn-reset-score" onclick="resetScoresOnly()">تصفير النتائج 🔢</button>
                <button class="pg2-btn" style="background:#555" onclick="createGrid()">إعادة توزيع الحروف 🔄</button>
            </div>
            <div class="control-group">
                <button class="pg2-btn btn-rename" onclick="promptTeamNames()">تغيير الأسماء ✏️</button>
                <button class="pg2-btn btn-win" onclick="celebrate()">مبروك ✨</button>
                <button class="pg2-btn btn-exit" onclick="location.reload()">🔙 خروج</button>
            </div>
        </div>
    </div>

    <div id="participant-view">
        <div class="login-wrapper" id="login-area">
            <h1>💡 دخول المتسابق</h1>
            <input type="text" id="room-input" class="input-box" placeholder="رمز الغرفة">
            <input type="text" id="username" class="input-box" placeholder="اسمك">
            <button class="admin-btn" onclick="login('الخمري')" style="background:#b71c1c; color:white">الفريق الخمري</button>
            <button class="admin-btn" onclick="login('البرتقالي')" style="background:#ff9800; color:white">الفريق البرتقالي</button>
        </div>
        <div id="game-area" style="display:none;" class="login-wrapper">
            <h1>🎉 تم الاتصال</h1>
            <p>انتظر سؤال المضيف...</p>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";
        let scoreTeam1 = 0, scoreTeam2 = 0;
        const originalLetters = ["أ","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن"];

        function showView(viewId) {
            ['admin-view', 'game-grid-view', 'participant-view'].forEach(v => document.getElementById(v).style.display = 'none');
            const target = document.getElementById(viewId);
            target.style.display = (viewId === 'game-grid-view') ? 'flex' : 'block';
        }

        if (window.innerWidth > 768) showView('admin-view');
        else showView('participant-view');

        function activateAdminRoom() {
            const room = document.getElementById('admin-room-input').value;
            if(!room) return alert("ادخل الرمز");
            currentRoom = room;
            socket.emit('joinRoom', room);
            document.getElementById('admin-setup-area').style.display = 'none';
            document.getElementById('admin-main-controls').style.display = 'block';
            document.getElementById('room-id-display').innerText = "#" + room;
            document.getElementById('room-tag').style.display = 'block';
        }

        function login(team) {
            const room = document.getElementById('room-input').value;
            const name = document.getElementById('username').value;
            if(!name || !room) return alert("اكمل البيانات");
            currentRoom = room;
            socket.emit('registerUser', {name, team, room});
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
        }

        function startTheGame() {
            showView('game-grid-view');
            createGrid();
            socket.emit('startGridGame', currentRoom);
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let letters = [...originalLetters].sort(() => Math.random() - 0.5);
            letters.forEach(char => {
                const container = document.createElement('div');
                container.className = 'hex-container';
                const hex = document.createElement('div');
                hex.className = 'hex state-0';
                hex.innerText = char;
                hex.dataset.state = 0;
                container.onclick = () => {
                    let s = (parseInt(hex.dataset.state) + 1) % 4;
                    hex.dataset.state = s;
                    hex.className = `hex state-${s}`;
                };
                container.appendChild(hex);
                grid.appendChild(container);
            });
        }

        function resetScoresOnly() {
            scoreTeam1 = 0; scoreTeam2 = 0;
            document.getElementById('score-1').innerText = "0";
            document.getElementById('score-2').innerText = "0";
        }

        function promptTeamNames() {
            let n1 = prompt("اسم الفريق 1:", "الفريق الخمري");
            let n2 = prompt("اسم الفريق 2:", "الفريق البرتقالي");
            if(n1) document.getElementById('team-name-1').innerText = n1;
            if(n2) document.getElementById('team-name-2').innerText = n2;
        }

        function celebrate() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function incrementScore(t) {
            if(t===1) { scoreTeam1++; document.getElementById('score-1').innerText = scoreTeam1; }
            else { scoreTeam2++; document.getElementById('score-2').innerText = scoreTeam2; }
        }

        function resetGameServer() { socket.emit('resetGame', currentRoom); }

        // Socket Events
        socket.on('updateUserList', (users) => {
            const mList = document.getElementById('team-maroon');
            const oList = document.getElementById('team-orange');
            if(!mList) return;
            mList.innerHTML = ''; oList.innerHTML = '';
            for(let id in users) {
                let li = document.createElement('li');
                li.innerText = users[id].name;
                if(users[id].team === 'الخمري') mList.appendChild(li);
                else oList.appendChild(li);
            }
        });

        socket.on('showBuzzerScreen', () => {
            if (window.innerWidth <= 768) document.getElementById('buzzer-overlay').style.display = 'flex';
        });

        document.getElementById('buzzer-overlay').onclick = () => socket.emit('pressBuzzer', currentRoom);

        socket.on('buzzerWinner', (data) => {
            const overlay = document.getElementById('buzzer-overlay');
            if(socket.id === data.id) {
                overlay.innerText = "أنت الأسرع!";
                overlay.classList.add('flash-red-active');
                document.getElementById('buzzer-sound').play();
            } else {
                overlay.innerText = "فاز: " + data.name;
            }
        });

        socket.on('buzzerAutoReset', () => {
            const overlay = document.getElementById('buzzer-overlay');
            overlay.classList.remove('flash-red-active');
            overlay.innerText = "اضغط!";
        });

        socket.on('gameReset', () => location.reload());
    </script>
</body>
</html>
