<div id="room-display" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; border: 1px solid #7c4dff; display: none; z-index: 9999;">
    <span style="color: #aaa; font-size: 12px;">الغرفة الحالية: </span>
    <span id="current-room-id" style="color: #00e676; font-weight: bold;">#---</span>
</div>

<script>
    // داخل دالة login ودالة setupAdminRoom أضف هذا السطر:
    function updateRoomUI(room) {
        const display = document.getElementById('room-display');
        const text = document.getElementById('current-room-id');
        text.innerText = "#" + room;
        display.style.display = 'block';
    }

</script>
