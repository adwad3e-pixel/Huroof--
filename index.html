<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المسابقات الذكي - نسخة الغرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=El+Messiri:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --grid-bg: linear-gradient(135deg, #1a1a1a 0%, #37474f 100%);
            --hex-width: 160px; 
            --hex-height: 184px;
            --hex-gap: 12px;
            --color-1-start: #fbc02d; 
            --color-1-end: #ffa000;
            --color-2-start: #b71c1c; 
            --color-2-end: #880e4f;
            --color-3-start: #ff9800; 
            --color-3-end: #e65100;
            --color-4-start: rgba(255, 255, 255, 0.1); 
            --color-4-end: rgba(255, 255, 255, 0.05);
            --maroon-team: #cf6679;
            --orange-team: #ffb74d;
        }

        body, html { margin: 0; font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }
        
        #admin-view, #participant-view, #game-grid-view { display: none; padding: 20px; box-sizing: border-box; width: 100%; }

        /* لوحة التحكم */
        .room-generator {
            background: rgba(124, 77, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #7c4dff;
            margin-bottom: 30px;
            text-align: center;
        }
        #room-display { font-size: 45px; font-weight: bold; color: #00e676; margin: 10px 0; letter-spacing: 5px; }

        .teams-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .team-box { flex: 1; min-width: 300px; background: #111; padding: 20px; border: 1px solid #333; }
        .team-list { list-style: none; padding: 0; }
        .team-list li { background: #222; margin: 5px 0; padding: 10px; border-radius: 5px; color: #00e676; }

        .admin-btn { width: 100%; padding: 15px; font-size: 18px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-family: 'Cairo'; }
        .btn-start { background-color: #00e676; color: #000; }
        .btn-reset { background-color: #ff1744; color: white; }

        /* شاشة اللعبة */
        #game-grid-view { background: var(--grid-bg); flex-direction: column; align-items: center; min-height: 100vh; }
        .scoreboard { display: flex; gap: 40px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px 50px; border-radius: 60px; border: 1px solid rgba(255,255,255,0.1); }
        .team-score { font-family: 'El Messiri'; font-size: 64px; line-height: 1; }
        
        .honeycomb { display: grid; grid-template-columns: repeat(5, var(--hex-width)); grid-auto-rows: calc(var(--hex-height) * 0.75 + var(--hex-gap)); gap: var(--hex-gap); justify-content: center; margin-bottom: 30px; }
        .hex-container { width: var(--hex-width); height: var(--hex-height); position: relative; cursor: pointer; }
        .hex-container:nth-child(10n+6), .hex-container:nth-child(10n+7), .hex-container:nth-child(10n+8), .hex-container:nth-child(10n+9), .hex-container:nth-child(10n+10) { transform: translateX(calc(var(--hex-width) / 2 + var(--hex-gap) / 2)); }
        .hex { width: 100%; height: 100%; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; transition: 0.3s; }
        
        .state-0 { background: rgba(255,255,255,0.1); color: white; }
        .state-1 { background: linear-gradient(135deg, var(--color-1-start), var(--color-1-end)); color: #333; }
        .state-2 { background: linear-gradient(135deg, var(--color-2-start), var(--color-2-end)); color: white; }
        .state-3 { background: linear-gradient(135deg, var(--color-3-start), var(--color-3-end)); color: white; }
        
        .controls { display: flex; justify-content: center; gap: 20px; width: 100%; padding-bottom: 20px; flex-wrap: wrap; }
        .pg2-btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }

        /* شاشة المتسابق */
        #participant-view { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-wrapper { width: 90%; max-width: 400px; background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; }
        .input-style { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #444; margin-bottom: 15px; background: #2c2c2c; color: white; text-align: center; font-size: 16px; box-sizing: border-box; }
        .choice-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; }

        /* البوزر */
        #buzzer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; z-index: 10000; justify-content: center; align-items: center; font-size: 60px; font-weight: bold; text-align: center; flex-direction: column; }
        .flash-active { animation: strobe 0.15s infinite; }
        @keyframes strobe { 0%, 100% { background: red; color: white; } 50% { background: white; color: red; } }
    </style>
</head>
<body>

    <div id="buzzer-overlay">اضغط!</div>
    <audio id="buzzer-sound" src="https://actions.google.com/sounds/v1/alarms/mechanical_clock_ring.ogg"></audio>

    <div id="admin-view">
        <div class="room-generator">
            <h2>🔑 نظام الغرف الذكي</h2>
            <div id="room-display">----</div>
            <button class="pg2-btn" style="background:#7c4dff; color:white" onclick="generateRoom()">توليد رقم غرفة جديد 🎲</button>
        </div>

        <button class="admin-btn btn-start" onclick="startTheGame()">▶️ بدء جولة لوحة الحروف</button>
        <button class="admin-btn btn-reset" onclick="resetGameServer()">🔄 إعادة ضبط النظام كاملاً</button>
        
        <div class="teams-container">
            <div class="team-box"><h2 style="color:var(--maroon-team)">الفريق الخمري</h2><ul id="team-maroon" class="team-list"></ul></div>
            <div class="team-box"><h2 style="color:var(--orange-team)">الفريق البرتقالي</h2><ul id="team-orange" class="team-list"></ul></div>
        </div>
    </div>

    <div id="game-grid-view">
        <div class="scoreboard">
            <div onclick="incrementScore(1)" style="color: var(--maroon-team); text-align:center; cursor:pointer">
                <span id="team-name-1">الفريق الخمري</span><br>
                <span id="score-1" class="team-score">0</span>
            </div>
            <div onclick="incrementScore(2)" style="color: var(--orange-team); text-align:center; cursor:pointer">
                <span id="team-name-2">الفريق البرتقالي</span><br>
                <span id="score-2" class="team-score">0</span>
            </div>
        </div>
        <div class="honeycomb" id="grid"></div>
        <div class="controls">
            <button class="pg2-btn" style="background:#e91e63; color:white" onclick="resetScoresOnly()">تصفير النتائج 🔢</button>
            <button class="pg2-btn" style="background:#555; color:white" onclick="createGrid();">إعادة توزيع الحروف 🔄</button>
            <button class="pg2-btn" style="background:#03a9f4; color:white" onclick="promptTeamNames()">تغيير الأسماء ✏️</button>
            <button class="pg2-btn" style="background:#4caf50; color:white" onclick="celebrate()">مبروك ✨</button>
            <button class="pg2-btn" style="background:#333; color:white" onclick="location.reload()">🔙 عودة</button>
        </div>
    </div>

    <div id="participant-view">
        <div class="login-wrapper" id="login-area">
            <h1 style="font-family:'El Messiri'">💡 انضم للمسابقة</h1>
            <input type="number" id="room-number" class="input-style" placeholder="أدخل رقم الغرفة (4 أرقام)">
            <input type="text" id="username" class="input-style" placeholder="أدخل اسمك الكريم">
            <button class="choice-btn" style="background:linear-gradient(135deg, #b71c1c, #880e4f)" onclick="login('الخمري')">الفريق الخمري</button>
            <button class="choice-btn" style="background:linear-gradient(135deg, #ff9800, #e65100)" onclick="login('البرتقالي')">الفريق البرتقالي</button>
        </div>
        <div id="game-area" style="display:none;" class="login-wrapper">
            <h2 style="color:#00e676">تم الاتصال بنجاح! ✅</h2>
            <p>رقم الغرفة: <span id="joined-room-id"></span></p>
            <p>انتظر بدء الجولة من قبل المضيف...</p>
        </div>
    </div>

    <script>
        const socket = io();
        const letters = ["أ", "ب", "ت", "ث", "ج", "ح", "خ", "د", "ذ", "ر", "ز", "س", "ش", "ص", "ض", "ط", "ظ", "ع", "غ", "ف", "ق", "ك", "ل", "م", "ن"];
        let score1 = 0, score2 = 0;
        let currentRoom = null;
        const buzzerOverlay = document.getElementById('buzzer-overlay');

        function showView(viewId) {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('game-grid-view').style.display = 'none';
            document.getElementById('participant-view').style.display = 'none';
            const target = document.getElementById(viewId);
            target.style.display = (viewId === 'game-grid-view') ? 'flex' : 'block';
        }

        if (window.innerWidth > 768) showView('admin-view');
        else showView('participant-view');

        // وظائف الإدمن
        function generateRoom() {
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room-display').innerText = currentRoom;
            socket.emit('joinRoom', currentRoom);
        }

        function startTheGame() {
            if(!currentRoom) return alert("يرجى توليد رقم غرفة أولاً!");
            showView('game-grid-view');
            createGrid();
            socket.emit('startGridGame');
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let shuffled = [...letters].sort(() => Math.random() - 0.5);
            shuffled.forEach(char => {
                const container = document.createElement('div');
                container.className = 'hex-container';
                const hex = document.createElement('div');
                hex.className = 'hex state-0';
                hex.innerText = char;
                hex.dataset.state = 0;
                container.onclick = () => {
                    let s = (parseInt(hex.dataset.state) + 1) % 4;
                    hex.dataset.state = s;
                    hex.className = `hex state-${s}`;
                };
                container.appendChild(hex);
                grid.appendChild(container);
            });
        }

        // وظائف اللاعب
        function login(team) {
            const name = document.getElementById('username').value;
            const room = document.getElementById('room-number').value;
            if(!name || !room) return alert("أكمل البيانات!");
            currentRoom = room;
            socket.emit('registerUser', {name, team, room});
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('joined-room-id').innerText = room;
        }

        // التحكم والسكور
        function incrementScore(t) {
            if(t===1) { score1++; document.getElementById('score-1').innerText = score1; }
            else { score2++; document.getElementById('score-2').innerText = score2; }
        }
        function resetScoresOnly() {
            score1 = 0; score2 = 0;
            document.getElementById('score-1').innerText = 0;
            document.getElementById('score-2').innerText = 0;
        }
        function promptTeamNames() {
            let n1 = prompt("اسم الفريق 1:", "خمري");
            let n2 = prompt("اسم الفريق 2:", "برتقالي");
            if(n1) document.getElementById('team-name-1').innerText = n1;
            if(n2) document.getElementById('team-name-2').innerText = n2;
        }
        function celebrate() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
        function resetGameServer() { socket.emit('resetGame'); }

        // أحداث السوكيت
        socket.on('updateUserList', (users) => {
            const mList = document.getElementById('team-maroon');
            const oList = document.getElementById('team-orange');
            if(!mList) return;
            mList.innerHTML = ''; oList.innerHTML = '';
            for(let id in users) {
                let li = document.createElement('li');
                li.innerText = users[id].name;
                if(users[id].team === 'الخمري') mList.appendChild(li);
                else oList.appendChild(li);
            }
        });

        socket.on('showBuzzerScreen', () => {
            if (window.innerWidth <= 768) {
                buzzerOverlay.style.display = 'flex';
                buzzerOverlay.innerText = 'اضغط!';
                buzzerOverlay.classList.remove('flash-active');
            }
        });

        buzzerOverlay.onclick = () => socket.emit('pressBuzzer');

        socket.on('buzzerWinner', (data) => {
            if (socket.id === data.id) {
                buzzerOverlay.innerText = 'أنت الأسرع! ⚡';
                buzzerOverlay.classList.add('flash-active');
                document.getElementById('buzzer-sound').play();
            } else {
                buzzerOverlay.innerText = 'فاز: ' + data.name;
                buzzerOverlay.classList.remove('flash-active');
            }
        });

        socket.on('buzzerAutoReset', () => {
            if (window.innerWidth <= 768) {
                buzzerOverlay.innerText = 'اضغط!';
                buzzerOverlay.classList.remove('flash-active');
            }
        });

        socket.on('gameReset', () => location.reload());
    </script>
</body>
</html>
