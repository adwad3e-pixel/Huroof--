<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام المسابقات المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=El+Messiri:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --grid-bg: linear-gradient(135deg, #1a1a1a 0%, #37474f 100%);
            --hex-width: 140px; 
            --hex-height: 160px;
            --hex-gap: 10px;
            --maroon-team: #cf6679;
            --orange-team: #ffb74d;
        }

        body, html { margin: 0; font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; min-height: 100vh; }
        
        #admin-view, #participant-view, #game-grid-view { display: none; padding: 20px; box-sizing: border-box; width: 100%; }

        /* شاشة اللعبة */
        #game-grid-view { 
            background: var(--grid-bg); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh;
        }

        .scoreboard { 
            display: flex; gap: 40px; margin-bottom: 20px; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); 
            padding: 10px 40px; border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .team-score { font-family: 'El Messiri'; font-size: 50px; line-height: 1; }

        /* الخلية */
        .honeycomb { 
            display: grid; 
            grid-template-columns: repeat(5, var(--hex-width)); 
            grid-auto-rows: calc(var(--hex-height) * 0.75 + var(--hex-gap)); 
            gap: var(--hex-gap); 
            justify-content: center;
            margin-bottom: 30px;
        }
        .hex-container { width: var(--hex-width); height: var(--hex-height); position: relative; cursor: pointer; }
        .hex-container:nth-child(10n+6), .hex-container:nth-child(10n+7), .hex-container:nth-child(10n+8), .hex-container:nth-child(10n+9), .hex-container:nth-child(10n+10) { transform: translateX(calc(var(--hex-width) / 2 + var(--hex-gap) / 2)); }
        
        .hex { 
            width: 100%; height: 100%; 
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex; justify-content: center; align-items: center; 
            font-size: 45px; font-weight: bold; transition: 0.3s; 
        }
        .state-0 { background: rgba(255, 255, 255, 0.1); color: white; }
        .state-1 { background: #ffa000; color: #000; } /* الفريق 1 */
        .state-2 { background: #b71c1c; color: #fff; } /* الفريق 2 */
        .state-3 { background: #388e3c; color: #fff; } /* لون محايد */

        /* الأزرار تحت الخلية - تأكدت من ظهورها هنا */
        .admin-controls-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 700px;
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
        }
        .btn-row { display: flex; gap: 10px; width: 100%; }
        .control-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white;
        }

        /* شاشة المتسابق */
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; margin: auto; }
        .input-style { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; text-align: center; }
        
        #buzzer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; color: black; z-index: 10000; justify-content: center; 
            align-items: center; font-size: 60px; font-weight: bold; text-align: center;
        }
        .flash-active { animation: flash 0.2s infinite; }
        @keyframes flash { 0% { background: red; color: white; } 100% { background: white; color: red; } }
    </style>
</head>
<body>

    <div id="buzzer-overlay">اضغط الآن!</div>
    <audio id="buzzer-sound" src="https://actions.google.com/sounds/v1/alarms/mechanical_clock_ring.ogg"></audio>

    <div id="admin-view">
        <div class="login-card">
            <h2>🔑 تفعيل الغرفة</h2>
            <input type="text" id="admin-room-input" class="input-style" placeholder="رقم الغرفة (مثلاً 101)">
            <button onclick="activateRoom()" class="control-btn" style="background: #7c4dff; width:100%">دخول كمسؤول</button>
            
            <div id="room-info" style="display:none; margin-top:20px;">
                <button onclick="startGrid()" class="control-btn" style="background: #00e676; color: #000; width:100%">▶️ ابدأ لوحة الحروف</button>
                <div style="display:flex; gap:10px; margin-top:20px">
                    <div style="flex:1"><h4>خمري</h4><ul id="list-m"></ul></div>
                    <div style="flex:1"><h4>برتقالي</h4><ul id="list-o"></ul></div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-grid-view">
        <div class="scoreboard">
            <div onclick="changeScore(1, 1)" style="color:var(--orange-team); text-align:center; cursor:pointer">
                <span id="name-1">الفريق البرتقالي</span><br>
                <span id="score-1" class="team-score">0</span>
            </div>
            <div style="font-size:40px; align-self:center">VS</div>
            <div onclick="changeScore(2, 1)" style="color:var(--maroon-team); text-align:center; cursor:pointer">
                <span id="name-2">الفريق الخمري</span><br>
                <span id="score-2" class="team-score">0</span>
            </div>
        </div>

        <div class="honeycomb" id="grid"></div>

        <div class="admin-controls-panel">
            <div class="btn-row">
                <button class="control-btn" style="background: #444" onclick="resetScores()">تصفير النتائج 🔢</button>
                <button class="control-btn" style="background: #666" onclick="createGrid()">إعادة توزيع الحروف 🔄</button>
            </div>
            <div class="btn-row">
                <button class="control-btn" style="background: #0288d1" onclick="renameTeams()">تغيير الأسماء ✏️</button>
                <button class="control-btn" style="background: #388e3c" onclick="celebrateNow()">مبروك ✨</button>
                <button class="control-btn" style="background: #d32f2f" onclick="location.reload()">🔙 خروج</button>
            </div>
        </div>
    </div>

    <div id="participant-view">
        <div class="login-card" id="p-login">
            <h2>📱 دخول لاعب</h2>
            <input type="text" id="p-room" class="input-style" placeholder="رقم الغرفة">
            <input type="text" id="p-name" class="input-style" placeholder="اسمك">
            <button onclick="pJoin('البرتقالي')" class="control-btn" style="background:var(--orange-team); width:100%; margin-bottom:5px">فريق برتقالي</button>
            <button onclick="pJoin('الخمري')" class="control-btn" style="background:var(--maroon-team); width:100%">فريق خمري</button>
        </div>
        <div id="p-wait" style="display:none" class="login-card">
            <h3>تم الاتصال بنجاح ✅</h3>
            <p>انتظر سؤال المضيف للضغط على البوزر</p>
        </div>
    </div>

    <script>
        const socket = io();
        let myRoom = "";
        let s1 = 0, s2 = 0;
        const letters = ["أ","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن"];

        // تبديل الشاشات
        function show(id) {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('game-grid-view').style.display = 'none';
            document.getElementById('participant-view').style.display = 'none';
            const el = document.getElementById(id);
            el.style.display = (id === 'game-grid-view') ? 'flex' : 'block';
        }

        if(window.innerWidth > 768) show('admin-view');
        else show('participant-view');

        // وظائف الإدمن
        function activateRoom() {
            myRoom = document.getElementById('admin-room-input').value;
            if(!myRoom) return alert("أدخل الرمز");
            socket.emit('joinRoom', myRoom);
            document.getElementById('room-info').style.display = 'block';
        }

        function startGrid() {
            show('game-grid-view');
            createGrid();
            socket.emit('startGridGame', myRoom);
        }

        function createGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            let shuffled = [...letters].sort(() => Math.random() - 0.5);
            shuffled.forEach(l => {
                const cont = document.createElement('div');
                cont.className = 'hex-container';
                const h = document.createElement('div');
                h.className = 'hex state-0';
                h.innerText = l;
                h.dataset.st = 0;
                cont.onclick = () => {
                    let next = (parseInt(h.dataset.st) + 1) % 4;
                    h.dataset.st = next;
                    h.className = `hex state-${next}`;
                };
                cont.appendChild(h);
                g.appendChild(cont);
            });
        }

        function changeScore(team, val) {
            if(team === 1) { s1 += val; document.getElementById('score-1').innerText = s1; }
            else { s2 += val; document.getElementById('score-2').innerText = s2; }
        }

        function resetScores() {
            s1 = 0; s2 = 0;
            document.getElementById('score-1').innerText = 0;
            document.getElementById('score-2').innerText = 0;
        }

        function renameTeams() {
            let n1 = prompt("اسم الفريق البرتقالي:", "البرتقالي");
            let n2 = prompt("اسم الفريق الخمري:", "الخمري");
            if(n1) document.getElementById('name-1').innerText = n1;
            if(n2) document.getElementById('name-2').innerText = n2;
        }

        function celebrateNow() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        // وظائف المتسابق
        function pJoin(team) {
            const r = document.getElementById('p-room').value;
            const n = document.getElementById('p-name').value;
            if(!r || !n) return alert("اكمل البيانات");
            myRoom = r;
            socket.emit('registerUser', {name: n, team: team, room: r});
            document.getElementById('p-login').style.display = 'none';
            document.getElementById('p-wait').style.display = 'block';
        }

        // Socket Events
        socket.on('updateUserList', (users) => {
            const lm = document.getElementById('list-m'), lo = document.getElementById('list-o');
            if(!lm) return;
            lm.innerHTML = ''; lo.innerHTML = '';
            for(let id in users) {
                let li = document.createElement('li'); li.innerText = users[id].name;
                if(users[id].team === 'الخمري') lm.appendChild(li);
                else lo.appendChild(li);
            }
        });

        socket.on('showBuzzerScreen', () => {
            if(window.innerWidth <= 768) document.getElementById('buzzer-overlay').style.display = 'flex';
        });

        document.getElementById('buzzer-overlay').onclick = () => socket.emit('pressBuzzer', myRoom);

        socket.on('buzzerWinner', (data) => {
            const ov = document.getElementById('buzzer-overlay');
            if(socket.id === data.id) {
                ov.innerText = "أنت الأسرع! ⚡";
                ov.classList.add('flash-active');
                document.getElementById('buzzer-sound').play();
            } else {
                ov.innerText = "فاز: " + data.name;
            }
        });

        socket.on('buzzerAutoReset', () => {
            const ov = document.getElementById('buzzer-overlay');
            ov.classList.remove('flash-active');
            ov.innerText = "اضغط الآن!";
        });
    </script>
</body>
</html>
