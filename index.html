<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحروف المطور</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; text-align: center; }
        
        /* شاشة اللعبة الأساسية */
        #game-grid-view { display: none; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        .scoreboard { display: flex; gap: 30px; background: #222; padding: 10px 40px; border-radius: 50px; margin-bottom: 20px; border: 2px solid #444; }
        .score { font-size: 40px; font-weight: bold; cursor: pointer; }
        
        /* الخلية */
        .honeycomb { display: grid; grid-template-columns: repeat(5, 120px); grid-auto-rows: 100px; gap: 10px; justify-content: center; margin-bottom: 150px; }
        .hex { 
            width: 120px; height: 130px; background: #333; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer;
        }
        .state-1 { background: #ffa000; color: #000; }
        .state-2 { background: #b71c1c; color: #fff; }
        .state-3 { background: #388e3c; color: #fff; }

        /* حاوية الأزرار - ثابتة أسفل الشاشة */
        .fixed-controls {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #111;
            padding: 15px; border-top: 3px solid #7c4dff; display: flex; flex-direction: column; gap: 10px; z-index: 999;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; flex: 1; max-width: 200px; }
        
        /* شاشات الدخول */
        .setup-screen { padding: 50px; }
        .input-field { padding: 10px; width: 250px; margin: 10px; border-radius: 5px; border: none; }
        
        #buzzer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; color: black; z-index: 10000; justify-content: center; align-items: center; font-size: 50px;
        }
    </style>
</head>
<body>

    <div id="buzzer-overlay">اضغط!</div>
    <audio id="buzzer-sound" src="https://actions.google.com/sounds/v1/alarms/mechanical_clock_ring.ogg"></audio>

    <div id="setup-admin" class="setup-screen">
        <h1>إعداد الغرفة</h1>
        <input type="text" id="room-id" class="input-field" placeholder="أدخل رقم الغرفة"><br>
        <button onclick="initAdmin()" class="btn" style="background:#7c4dff">تفعيل ودخول</button>
    </div>

    <div id="game-grid-view">
        <div class="scoreboard">
            <div onclick="addScore(1)" style="color:#ffa000"><span id="n1">فريق 1</span><br><span id="s1" class="score">0</span></div>
            <div onclick="addScore(2)" style="color:#cf6679"><span id="n2">فريق 2</span><br><span id="s2" class="score">0</span></div>
        </div>

        <div class="honeycomb" id="grid"></div>

        <div class="fixed-controls">
            <div class="btn-group">
                <button onclick="resetScores()" class="btn" style="background:#444">تصفر السكور 🔢</button>
                <button onclick="createGrid()" class="btn" style="background:#666">توزيع الحروف 🔄</button>
            </div>
            <div class="btn-group">
                <button onclick="changeNames()" class="btn" style="background:#0288d1">تغيير الأسماء ✏️</button>
                <button onclick="winEffect()" class="btn" style="background:#388e3c">مبروك ✨</button>
                <button onclick="location.reload()" class="btn" style="background:#d32f2f">خروج 🔙</button>
            </div>
        </div>
    </div>

    <div id="setup-player" class="setup-screen" style="display:none">
        <h2>دخول متسابق</h2>
        <input type="text" id="p-room" class="input-field" placeholder="رقم الغرفة"><br>
        <input type="text" id="p-name" class="input-field" placeholder="اسمك"><br>
        <button onclick="playerJoin('خمري')" class="btn" style="background:#b71c1c">فريق خمري</button>
        <button onclick="playerJoin('برتقالي')" class="btn" style="background:#ffa000">فريق برتقالي</button>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";
        let score1 = 0, score2 = 0;

        if(window.innerWidth <= 768) {
            document.getElementById('setup-admin').style.display = 'none';
            document.getElementById('setup-player').style.display = 'block';
        }

        function initAdmin() {
            currentRoom = document.getElementById('room-id').value;
            if(!currentRoom) return alert("ادخل الرقم");
            socket.emit('joinRoom', currentRoom);
            document.getElementById('setup-admin').style.display = 'none';
            document.getElementById('game-grid-view').style.display = 'flex';
            createGrid();
            socket.emit('startGridGame', currentRoom);
        }

        function playerJoin(team) {
            const r = document.getElementById('p-room').value;
            const n = document.getElementById('p-name').value;
            if(!r || !n) return alert("اكمل البيانات");
            currentRoom = r;
            socket.emit('registerUser', {name: n, team: team, room: r});
            document.getElementById('setup-player').innerHTML = "<h1>تم الاتصال ✅</h1>";
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const letters = "أبتثجحخدذرزسشصضطظعغفقكلمن".split("");
            letters.sort(() => Math.random() - 0.5).forEach(l => {
                const h = document.createElement('div');
                h.className = 'hex';
                h.innerText = l;
                h.onclick = function() {
                    let st = (this.dataset.st || 0);
                    st = (parseInt(st) + 1) % 4;
                    this.dataset.st = st;
                    this.className = 'hex state-' + st;
                };
                grid.appendChild(h);
            });
        }

        function addScore(t) {
            if(t===1) { score1++; document.getElementById('s1').innerText = score1; }
            else { score2++; document.getElementById('s2').innerText = score2; }
        }

        function resetScores() {
            score1 = 0; score2 = 0;
            document.getElementById('s1').innerText = 0;
            document.getElementById('s2').innerText = 0;
        }

        function changeNames() {
            let p1 = prompt("اسم الفريق الأول:");
            let p2 = prompt("اسم الفريق الثاني:");
            if(p1) document.getElementById('n1').innerText = p1;
            if(p2) document.getElementById('n2').innerText = p2;
        }

        function winEffect() { confetti({ particleCount: 150, spread: 70 }); }

        // Socket Events
        socket.on('showBuzzerScreen', () => {
            if(window.innerWidth <= 768) document.getElementById('buzzer-overlay').style.display = 'flex';
        });

        document.getElementById('buzzer-overlay').onclick = () => socket.emit('pressBuzzer', currentRoom);

        socket.on('buzzerWinner', (data) => {
            const ov = document.getElementById('buzzer-overlay');
            if(socket.id === data.id) {
                ov.innerText = "أنت الأسرع! ⚡";
                document.getElementById('buzzer-sound').play();
            } else {
                ov.innerText = "فاز: " + data.name;
            }
        });

        socket.on('buzzerAutoReset', () => {
            document.getElementById('buzzer-overlay').innerText = "اضغط!";
        });
    </script>
</body>
</html>
