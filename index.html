<div id="room-join-view" style="display: none;">
    <h2>Join Room</h2>
    <input type="text" id="room-code" placeholder="Enter 4-digit Room Code" maxlength="4" pattern="[0-9]{4}" style="width: 100%; padding: 10px; font-size: 16px;">
    <button onclick="joinRoom()">Join Room</button>
</div>

<style>
    #room-join-view {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
    }
    #room-code {
        display: block;
        font-size: 16px;
        padding: 10px;
        width: 80%;
    }
    button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
</style>

<script>
    function joinRoom() {
        const roomCode = document.getElementById('room-code').value;
        if (roomCode.match(/^[0-9]{4}$/)) {
            // Assuming socket is already defined and connected
            socket.emit('joinRoom', roomCode);
        } else {
            alert('Please enter a valid 4-digit room code.');
        }
    }

    // Initialization code to show room-join-view on mobile devices
    if (window.matchMedia("(max-width: 768px)").matches) {
        document.getElementById('room-join-view').style.display = 'flex';
    } else {
        // Proceed with the participant view if not mobile
        document.getElementById('participant-view').style.display = 'flex';
    }
</script>
